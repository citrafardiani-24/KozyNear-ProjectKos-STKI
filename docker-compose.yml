services:
  postgres:
    image: postgres:16-alpine
    container_name: tki-kos-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tki_kos
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tki_kos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
